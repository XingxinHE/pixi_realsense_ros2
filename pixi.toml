[workspace]
authors = ["Xingxin HE <xingxin.he@connect.ust.hk>"]
channels = ["robostack-humble", "conda-forge"]
name = "pixi_realsense_ros2"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
CRISP_CONFIG_PATH = "./crisp_configs"

[tasks]
camera = "ros2 launch realsense2_camera rs_launch.py camera_namespace:=/ camera_name:=camera enable_depth:=false rgb_camera.color_profile:=640x480x30"
test-image = "python one_camera.py"
camera-dual = "ros2 launch realsense2_camera rs_multi_camera_launch.py camera_namespace1:=/ camera_name1:=wrist serial_no1:=_342522074350 camera_namespace2:=/ camera_name2:=third_person serial_no2:=_347622071856 enable_depth1:=false enable_depth2:=false rgb_camera.color_profile1:=640x480x30 rgb_camera.color_profile2:=640x480x30"
test-image-dual = "python two_cameras.py"

[dependencies]
ros-humble-desktop = ">=0.10.0,<0.11"
ros-humble-librealsense2 = ">=2.55.1,<3"
ros-humble-realsense2-camera = ">=4.55.1,<5"
ros-humble-realsense2-camera-msgs = ">=4.55.1,<5"
ros-humble-realsense2-description = ">=4.55.1,<5"
python = ">=3.11.14,<3.12"
matplotlib = ">=3.10.8,<4"
ros-humble-ros2-control = ">=2.47.0,<3"
ros-humble-ros2-controllers = ">=2.40.0,<3"
ros-humble-compressed-image-transport = ">=2.5.2,<3"

[pypi-dependencies]
crisp-python = ">=3.4.0, <4"
